<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" cotent="width=device-width, inital=scale=1">
	<title>Javascript</title>

</head>
<body>
	<script type="text/javascript">
		var total = 0;
		var angka = 0;
		while(angka != -1){
			var inputuser = prompt('masukkan angka (-1 untuk berhenti)' );
			angka = Number(inputuser);

			if(angka != -1){
				total += angka;
			}
		}
		alert('program berhenti ');
		console.log('total penjumlahan: ' + total);
	</script>

</body>
</html>
