<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" cotent="width=device-width, inital=scale=1">
	<title>Javascript</title>

</head>
<body>
	<script type="text/javascript">
		var total = 0;
		var counter = 1;
		while(counter < 11){
			var input_user = prompt('masukkan angka ' + ':');
			var angka = Number(input_user);
			total += angka;
			counter += 1;
		}
		alert('total penjumlahan ' + total);
		console.log('total penjumlahan ' + total);
	</script>

</body>
</html>
