<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Javascript Simple Login</title>
</head>
<body>
	<script type="text/javascript">
		var username = prompt('masukkan username kamu');
		var passcode = prompt('masukkan passcode kamu');

		if(username == 'admin' && passcode === 'pass'){
			console.log('login true');
		}else{
			alert('incorrect username or passcode !');
			console.log('login false');
		}
	</script>
</body>
</html>
