<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" cotent="width=device-width, inital=scale=1">
	<title>Javascript</title>

</head>
<body>
	<script type="text/javascript">
	var skor_user = 0;
	var skor_komp = 0;

	for(var putaran = 1; putaran <= 3; putaran++) {
		
		var inputan = prompt('ronde ' + putaran + ' batu, gunting, atau kertas?');
		var user = inputan.toLowerCase();
		var acak = Math.floor(Math.random() * 3);
		var komp;
		
		if(acak == 0){
			komp = 'batu';
		} else if(acak == 1){
			komp = 'gunting';
		} else {
			komp = 'kertas';
		}

		if(user == komp){
			console.log('user ' + user + ' vs computer ' + komp + ' = draw');
		} 
		else if(user == 'batu' && komp == 'gunting' || user == 'gunting' && komp == 'kertas' || user == 'kertas' && komp == 'batu') {
			console.log('user ' + user + ' vs computer ' + komp + ' = user Wins');
			skor_user += 1;
		} 
		else {
			// selain kondisi diatas dan draw, berarti komputer menang
			console.log('user ' + user + ' vs computer ' + komp + ' = computer wins');
			skor_komp += 1;
		}
	}
	console.log(' ');

	if(skor_user > skor_komp) {
		console.log('user wins the game !');
	} else if(skor_komp > skor_user) {
		console.log('computer wins the game !');
	} else {
		console.log('draw game !');
	}

	</script>
</body>
</html>
